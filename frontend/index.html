<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log2LocalLLM Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="glass-header">
        <div class="logo">
            <h1>Log2LocalLLM</h1>
            <p class="subtitle">AI-Powered Docker Error Analysis</p>
        </div>
        <div class="actions">
            <button id="clear-all-btn" class="btn danger">Clear All</button>
            <button id="refresh-btn" class="btn primary">Refresh</button>
            <button id="view-exclusions-btn" class="btn secondary">Exclusions</button>
        </div>
    </header>

    <div id="page-body">
        <!-- Filter Sidebar -->
        <aside id="filter-panel" class="glass-card filter-panel">
            <div class="filter-section">
                <div class="filter-heading">Status</div>
                <label class="filter-chip">
                    <input type="checkbox" class="type-filter" value="intervention" checked>
                    <span class="chip intervention">Needs Intervention</span>
                </label>
                <label class="filter-chip">
                    <input type="checkbox" class="type-filter" value="transient" checked>
                    <span class="chip transient">Likely Transient</span>
                </label>
                <label class="filter-chip">
                    <input type="checkbox" class="type-filter" value="unknown" checked>
                    <span class="chip unknown">Analyzed</span>
                </label>
            </div>
            <div class="filter-section">
                <div class="filter-heading">Containers</div>
                <div id="container-filters">
                    <span class="filter-empty">No data yet</span>
                </div>
            </div>
        </aside>

        <!-- Main content -->
        <main id="main-content">
            <!-- Queue Status Panel -->
            <section id="queue-panel" class="queue-panel hidden">
                <div class="queue-header">
                    <div class="queue-title">
                        <span class="pulse-dot" id="queue-pulse"></span>
                        <span>Analysis Queue</span>
                    </div>
                    <span id="queue-count" class="queue-badge">0 pending</span>
                </div>
                <ul id="queue-list" class="queue-list"></ul>
            </section>

            <div id="loading" class="loading-state">Loading analyses...</div>
            <div id="error-feed" class="error-grid hidden"></div>
        </main>
    </div>

    <!-- Exclusions Modal -->
    <div id="exclusion-modal" class="modal hidden">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2>Add Exclusion Rule</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <label>Container</label>
                <input type="text" id="excl-container" readonly>
                <label>Pattern (Substring to ignore)</label>
                <textarea id="excl-pattern" rows="3"></textarea>
            </div>
            <div class="modal-actions">
                <button id="save-exclusion" class="btn primary">Save Rule</button>
            </div>
        </div>
    </div>

    <!-- Active Exclusions Modal -->
    <div id="active-exclusions-modal" class="modal hidden">
        <div class="modal-content glass-card wide">
            <div class="modal-header">
                <h2>Active Exclusions</h2>
                <button class="close-btn-active">&times;</button>
            </div>
            <div class="modal-body">
                <ul id="exclusions-list" class="exclusions-list"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
